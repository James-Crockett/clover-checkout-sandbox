<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Checkout</title>
        <link rel="stylesheet" href="index.css" />
    </head>

    <body>
        <main class="checkout">
            <section class="summary">
                <p class="merchant">Checkout</p>
                <h1>Complete your payment</h1>
                <p class="summary-text">
                    Enter the payment amount and a short description.
                </p>
            </section>

            <section class="payment">
                <h2>Payment details</h2>

                <label for="amount">Amount</label>
                <div class="amount-field">
                    <span>$</span>
                    <input id="amount" type="number" />
                </div>

                <label for="description">Description</label>
                <input
                    id="description"
                    type="text"
                    step="0.01"
                    placeholder="What is this payment for?"
                />

                <button onclick="submitPayment()">Pay now</button>

                <div class="result-panel">
                    <h3>Payment result</h3>
                    <pre id="result"></pre>
                </div>
            </section>
        </main>

        <!-- async function -->
        <script>
            async function submitPayment() {
                const amount = Number(document.getElementById("amount").value);
                const description =
                    document.getElementById("description").value;

                // fetch endpoint, update, specify json is sent, convert javascript to JSON
                const response = await fetch(
                    "http://localhost:8000/api/payments",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            amount: amount,
                            description: description,
                        }),
                    },
                );

                // await till server response
                const data = await response.json();

                // displays the result that we get from the API
                document.getElementById("result").innerText = JSON.stringify(
                    data,
                    null,
                    2,
                );
            }
        </script>
    </body>
</html>
